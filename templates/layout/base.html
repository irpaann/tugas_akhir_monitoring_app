<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Monitoring Dashboard{% endblock %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

    {% include "components/navbar.html" %}

    <div class="container-fluid">
        <div class="row align-items-start">

            {% include "components/sidebar.html" %}

            <main class="col-md-10 col-lg-10">
                <div class="pt-4">
                    {% block content %}{% endblock %}
                </div>
            </main>

        </div>
    </div>

    {% include "components/sidebar_mobile.html" %}

    <!-- LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

    <script>
    // Taruh ini di file layout utama (sebelum tag body tutup)
    document.addEventListener("DOMContentLoaded", function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.sidebar .nav-link');

        navLinks.forEach(link => {
            link.classList.remove('active');
            // Pakai logic 'endsWith' untuk jaga-jaga jika ada perbedaan slash
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    });
</script>
</body>
</html>
