<!DOCTYPE html>
<html>
<head>
    <title>Monitoring Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-white shadow-sm ">
        <div class="container-fluid">

            <!-- HAMBURGER (MOBILE ONLY) -->
            <button
                class="btn btn-outline-secondary d-md-none"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMobile"
            >
                ☰
            </button>

            <a class="navbar-brand fw-semibold ms-2" href="#">
                <img
                    src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg"
                    width="30"
                    height="24"
                    alt="Logo"
                >
                Log Monitoring
            </a>
        </div>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="container-fluid ">
        <div class="row align-items-start">

            <!-- SIDEBAR -->
            <aside class="col-md-2 col-lg-2 d-none d-md-block p-0">
                <div class="sidebar">
                    <nav class="nav flex-column mt-3 gap-1">
                        <a class="nav-link active" href="#">Dashboard</a>
                        <a class="nav-link" href="#">Logs</a>
                        <a class="nav-link" href="#">Black List</a>
                        <a class="nav-link" href="#">Threats</a>
                        <a class="nav-link" href="#">Settings</a>
                    </nav>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="col-md-10 col-lg-10">
                <div class="pt-4">
                    <div class="container">
                        <div class="card shadow-sm mb-4">

                            <div class="card-header">
                                <h5 class="mb-0">Recent Logs (Compact)</h5>

                                <div class="card mb-3">
                                    <div class="card-body py-2">
                                        <div class="row g-2 align-items-end">

                                            <div class="col-6 col-md-2">
                                                <label class="form-label small">IP</label>
                                                <input
                                                    id="filterIp"
                                                    type="text"
                                                    class="form-control form-control-sm"
                                                >
                                            </div>

                                            <div class="col-6 col-md-2">
                                                <label class="form-label small">Method</label>
                                                <select
                                                    id="filterMethod"
                                                    class="form-select form-select-sm"
                                                >
                                                    <option value="">All</option>
                                                    <option value="GET">GET</option>
                                                    <option value="POST">POST</option>
                                                </select>
                                            </div>

                                            <div class="col-6 col-md-2">
                                                <label class="form-label small">Status</label>
                                                <select
                                                    id="filterStatus"
                                                    class="form-select form-select-sm"
                                                >
                                                    <option value="">All</option>
                                                    <option value="200">200</option>
                                                    <option value="404">404</option>
                                                    <option value="500">500</option>
                                                </select>
                                            </div>

                                            <div class="col-6 col-md-3">
                                                <label class="form-label small">From</label>
                                                <input
                                                    id="filterStart"
                                                    type="datetime-local"
                                                    class="form-control form-control-sm"
                                                >
                                            </div>

                                            <div class="col-6 col-md-3">
                                                <label class="form-label small">To</label>
                                                <input
                                                    id="filterEnd"
                                                    type="datetime-local"
                                                    class="form-control form-control-sm"
                                                >
                                            </div>

                                            <div class="col-6 col-md-2">
                                                <button
                                                    class="btn btn-sm btn-primary w-100"
                                                    onclick="loadLogs();loadCharts();"
                                                >
                                                    Apply
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card-body p-0">
                                <div
                                    class="table-responsive"
                                    style="max-height: 250px; overflow-y: auto;"
                                >
                                    <table
                                        id="logTable"
                                        class="table table-sm table-striped table-hover mb-0 align-middle"
                                    >
                                        <thead class="table-secondary small">
                                            <tr>
                                                <th>ID</th>
                                                <th>Time</th>
                                                <th>IP</th>
                                                <th>Method</th>
                                                <th>Status</th>
                                                <th>Path</th>
                                                <th>Full URL</th>
                                                <th>UA</th>
                                                <th>Payload</th>
                                                <th>Threat</th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="container px-3">
                        <div class="row g-3">

                            <div class="col-md-4">
                                <div class="card shadow-sm">
                                    <div class="card-body">
                                        <h5>Requests per Minute</h5>
                                        <canvas id="chartRequests"></canvas>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="card shadow-sm">
                                    <div class="card-body">
                                        <h5>Request Methods</h5>
                                        <canvas id="chartMethods"></canvas>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="card shadow-sm">
                                    <div class="card-body">
                                        <h5>Status Codes</h5>
                                        <canvas id="chartStatus"></canvas>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div
        class="offcanvas offcanvas-start"
        tabindex="-1"
        id="sidebarMobile"
        >
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Monitoring</h5>
            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"
            ></button>
        </div>

        <div class="offcanvas-body">
            <nav class="nav flex-column gap-2">
                <a class="nav-link active" href="#">Dashboard</a>
                <a class="nav-link" href="#">Logs</a>
                <a class="nav-link" href="#">Statistics</a>
                <a class="nav-link" href="#">Threats</a>
                <a class="nav-link" href="#">Settings</a>
            </nav>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/dashboard.js"></script>

</body>
</html>
